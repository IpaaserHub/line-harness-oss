name = "lh-super-admin-test"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true

# ═══════════════════════════════════════════════════════════════
# WL社 super admin テナント用テスト環境（Phase 1 super admin 動作確認専用）
# 使い方: npx wrangler deploy
# 完全な production 払出しは line-harness-oss/apps/provisioner で行う想定。
# ═══════════════════════════════════════════════════════════════
account_id = "b1b0089f27951dbf63d210093808a0b3"

[assets]
directory = "dist/client"
binding = "ASSETS"
# Worker を先に走らせて bot UA → OGP HTML 差し込みを可能にする。
# 通常 UA のときは Worker の notFound 内で c.env.ASSETS.fetch(req) を呼んで
# SPA を返す。これが無いと static asset path が Worker をバイパスして
# 直接配信され、bot 判定が効かない。
run_worker_first = true

[[d1_databases]]
binding = "DB"
database_name = "lh-super-admin-test"
database_id = "9b3d2384-24c8-4373-b09d-e6fd9c4fc10d"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "line-harness-images"

[triggers]
crons = ["*/5 * * * *", "0 */6 * * *"]

# ═══════════════════════════════════════════════════════════════
# 本番環境
# 使い方: npx wrangler deploy --env production --name your-worker-name
# D1:     npx wrangler d1 execute your-database --env production --remote --file ...
# ═══════════════════════════════════════════════════════════════
[env.production]
account_id = "YOUR_ACCOUNT_ID"

[env.production.assets]
directory = "dist/client"
binding = "ASSETS"
run_worker_first = true

[[env.production.d1_databases]]
binding = "DB"
database_name = "line-crm"
database_id = "YOUR_D1_DATABASE_ID"

[[env.production.r2_buckets]]
binding = "IMAGES"
bucket_name = "line-harness-images"

[env.production.triggers]
crons = ["*/5 * * * *", "0 */6 * * *"]
